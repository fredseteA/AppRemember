# fly.toml - Configuração para Fly.io
# Remember QRCode Backend

app = "remember-qrcode-api"
primary_region = "gru"  # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile"

[env]
  # Variáveis públicas (não sensíveis)
  # As variáveis sensíveis devem ser configuradas via: fly secrets set

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
