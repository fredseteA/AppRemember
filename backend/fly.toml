# fly.toml app configuration file for remember-qrcode-api
# Optimized for cost on 2026-05-02
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'remember-qrcode-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'    
  auto_start_machines = true
  min_machines_running = 0       
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'               
  cpus = 1